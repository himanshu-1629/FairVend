<!DOCTYPE html>
<html>
<head>
<title>FairVend Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background:#f1f5f9;
margin:0;
}

/* NAVBAR */

.navbar{
background:#111827;
color:white;
padding:18px 40px;
font-size:20px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar span{
font-size:14px;
opacity:.7;
}

/* CONTAINER */

.container{
padding:40px;
}

/* STATS */

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
}

.stat-card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.stat-card h3{
margin:0;
font-size:14px;
color:#6b7280;
}

.stat-card p{
margin:8px 0 0;
font-size:28px;
font-weight:700;
}

/* SEARCH */

.search{
margin-bottom:20px;
}

.search input{
width:300px;
padding:10px;
border-radius:6px;
border:1px solid #d1d5db;
}

/* CARD */

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
overflow:hidden;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#4f46e5;
color:white;
padding:14px;
text-align:left;
font-weight:500;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
}

tr:hover{
background:#f9fafb;
}

/* BUTTONS */

button{
border:none;
padding:8px 14px;
border-radius:6px;
font-weight:500;
cursor:pointer;
margin-right:5px;
}

.approve{
background:#22c55e;
color:white;
}

.reject{
background:#ef4444;
color:white;
}

.approve:hover{ background:#16a34a }
.reject:hover{ background:#dc2626 }

/* VIEW */

.view{
background:#3b82f6;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.view:hover{ background:#2563eb }

/* STATUS */

.status{
padding:4px 10px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

.pending{ background:#fef3c7; color:#92400e }
.approved{ background:#dcfce7; color:#166534 }
.rejected{ background:#fee2e2; color:#991b1b }

</style>
</head>

<body>

<div class="navbar">
FairVend Admin Dashboard
<span>Verification Panel</span>
</div>

<div class="container">

<div class="stats">

<div class="stat-card">
<h3>Pending</h3>
<p id="pendingCount">0</p>
</div>

<div class="stat-card">
<h3>Approved</h3>
<p id="approvedCount">0</p>
</div>

<div class="stat-card">
<h3>Rejected</h3>
<p id="rejectedCount">0</p>
</div>

</div>

<div class="search">
<input type="text" id="searchBox" placeholder="Search email..." onkeyup="filterUsers()">
</div>

<div class="card">

<table>

<thead>
<tr>
<th>Email</th>
<th>Ration Card</th>
<th>Income Proof</th>
<th>Bank Statement</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://wilhvtvphguwyjwukogs.supabase.co",
"sb_publishable_ybphFbj_Nny3nq3-StplzA_J9jwTdR5"
)

emailjs.init("ydacdVHvuJ5e2SdZp")

let allUsers=[]

async function loadUsers(){

const {data,error} = await supabaseClient
.from("verifications")
.select("*")
.order("created_at",{ascending:false})

if(error){
console.log(error)
return
}

allUsers=data
renderUsers(data)

updateStats(data)

}

function renderUsers(data){

const table=document.getElementById("userTable")
table.innerHTML=""

data.forEach(user=>{

const row=document.createElement("tr")

row.innerHTML=`

<td>${user.user_email}</td>

<td>
<a class="view"
href="https://wilhvtvphguwyjwukogs.supabase.co/storage/v1/object/public/applications/${user.ration_number}/${user.full_name.replace(/\s+/g,'_')}_${user.ration_number}_ration.pdf"
target="_blank">View</a>
</td>

<td>
<a class="view"
href="https://wilhvtvphguwyjwukogs.supabase.co/storage/v1/object/public/applications/${user.ration_number}/${user.full_name.replace(/\s+/g,'_')}_${user.ration_number}_income.pdf"
target="_blank">View</a>
</td>

<td>
<a class="view"
href="https://wilhvtvphguwyjwukogs.supabase.co/storage/v1/object/public/applications/${user.ration_number}/${user.full_name.replace(/\s+/g,'_')}_${user.ration_number}_bank.pdf"
target="_blank">View</a>
</td>

<td>
<span class="status ${user.status}">
${user.status}
</span>
</td>

<td>

${user.status==="pending"?`

<button class="approve"
onclick="approveUser(this,'${user.user_email}')">
Approve
</button>

<button class="reject"
onclick="rejectUser(this,'${user.user_email}')">
Reject
</button>

`:`
<span style="font-weight:bold">${user.status}</span>
`}

</td>

`

table.appendChild(row)

})

}

function updateStats(data){

let pending=0
let approved=0
let rejected=0

data.forEach(u=>{
if(u.status==="pending") pending++
if(u.status==="approved") approved++
if(u.status==="rejected") rejected++
})

document.getElementById("pendingCount").innerText=pending
document.getElementById("approvedCount").innerText=approved
document.getElementById("rejectedCount").innerText=rejected

}

function filterUsers(){

const term=document.getElementById("searchBox").value.toLowerCase()

const filtered=allUsers.filter(u =>
u.user_email.toLowerCase().includes(term)
)

renderUsers(filtered)

}

async function approveUser(btn,email){

if(!confirm("Approve this user?")) return

btn.disabled=true
btn.innerText="Processing..."

const {data,error}=await supabaseClient
.from("verifications")
.update({status:"approved"})
.eq("user_email",email)
.select()
.single()

if(error){
alert("Error approving")
btn.disabled=false
btn.innerText="Approve"
return
}

const machineId = data.machine_id

await emailjs.send(
"service_43g7bme",
"template_becaygi",
{ 
to_email:email,
machine_id:machineId
}
)

alert("User approved and email sent")

loadUsers()

}
async function rejectUser(btn,email){

btn.disabled=true
btn.innerText="Processing..."

const {error}=await supabaseClient
.from("verifications")
.update({status:"rejected"})
.eq("user_email",email)

if(error){
alert("Error rejecting")
btn.disabled=false
btn.innerText="Reject"
return
}

alert("User rejected")

loadUsers()

}

loadUsers()

</script>

</body>
</html>
